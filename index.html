<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portfolio Website</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #1f2937, #0f172a);
        color: #f8fafc;
      }
      main {
        max-width: 720px;
        padding: 3rem;
        text-align: center;
        background: rgba(15, 23, 42, 0.8);
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.55);
      }
      h1 {
        margin-bottom: 0.5rem;
        font-size: clamp(2rem, 3vw, 3rem);
      }
      p {
        margin: 0.75rem 0;
        line-height: 1.6;
        color: #cbd5f5;
      }
      code {
        background: rgba(148, 163, 184, 0.2);
        padding: 0.2rem 0.4rem;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Portfolio Website</h1>
      <p>Your portfolio site is ready to run locally.</p>
      <p>
        Start the server with <code>npm start</code> and open
        <code>http://localhost:3002</code>.
      </p>
      <p>Edit <code>index.html</code> to customize this page.</p>
    </main>
  </body>
</html>
